# Render 部署配置
# 连接到 GitHub 仓库后，Render 会自动识别此文件
services:
  - type: web
    name: pocketmon-battle
    env: node
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /health
    # WebSocket 需要关闭自动缩放
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.22.2
